services:
  # ─────────────────────────────────────────────
  # Backend — Express.js API
  # ─────────────────────────────────────────────
  - type: web
    name: venusteportfolio
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://portfolio-xlzv.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ─────────────────────────────────────────────
  # Frontend — React (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: portfolio-xlzv
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://venusteportfolio.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─────────────────────────────────────────────
# PostgreSQL Database
# ─────────────────────────────────────────────
databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio_user
